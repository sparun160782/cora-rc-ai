apiVersion: apps/v1
kind: Deployment
metadata:
  name: cora-frontend
  labels:
    app: cora-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cora-frontend
  template:
    metadata:
      labels:
        app: cora-frontend
    spec:
      containers:
      - name: cora-frontend
        image: cora-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cora-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: cora-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
